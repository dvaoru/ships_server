name: Deploy Colyseus

on:
  push:
    branches:
      - main


jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Deploy server

        uses: appleboy/ssh-action@v1

        with:

          host: ${{ secrets.SERVER_HOST }}

          username: ${{ secrets.SERVER_USER }}

          key: ${{ secrets.SERVER_SSH_KEY }}


          script: |

            cd /root/ships/ships_server

            git pull

            npm install

            npm run build || exit 1

            pm2 reload colyseus